<!DOCTYPE html>
<html>
<head>
    <title>Sum of N Numbers</title>

    
</head>

<body>

    <div class="container">
        <h2>Sum of N Numbers</h2>

        <label>Enter a number (N):</label><br>
        <input type="number" id="num"><br>

        <button onclick="findSum()">Calculate</button>

        <h3 id="result"></h3>
    </div>

    <script>
        function findSum() {
            let n = parseInt(document.getElementById("num").value);
            let sum = 0;

            for (let i = 1; i <= n; i++) {
                sum += i;
            }

            document.getElementById("result").innerHTML =
                "Sum of numbers from 1 to " + n + " is " + sum;
        }
    </script>
  <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            background: white;
            width: 350px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            color: #333;
        }

        input {
            padding: 8px;
            width: 80%;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            color: green;
            margin-top: 15px;
        }
    </style>
</body>
</html>
